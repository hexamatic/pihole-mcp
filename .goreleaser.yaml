version: 2

project_name: pihole-mcp

before:
  hooks:
    - go mod tidy

builds:
  # Default build — includes OpenTelemetry support. This is what users get
  # via `go install`, the standard release tarballs, and the unsuffixed
  # Docker tags.
  - id: pihole-mcp
    main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hexamatic/pihole-mcp/internal/server.Version={{.Version}}

  # Slim build — strips OpenTelemetry deps via the `slim` build tag. ~45%
  # smaller binary (17 MB → 9 MB on linux/amd64, 6 MB → 3.5 MB compressed).
  # Functionally identical aside from OTEL_EXPORTER_OTLP_ENDPOINT being a
  # no-op. Distributed alongside the default build for users who want a
  # leaner footprint (resource-constrained homelabs, no-tracing setups).
  - id: pihole-mcp-slim
    main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    tags:
      - slim
    ldflags:
      - -s -w
      - -X github.com/hexamatic/pihole-mcp/internal/server.Version={{.Version}}

archives:
  - id: default
    ids:
      - pihole-mcp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

  - id: slim
    ids:
      - pihole-mcp-slim
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-slim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

dockers_v2:
  # Default Docker image: ghcr.io/hexamatic/pihole-mcp:{version} + :latest.
  # The :latest tag only moves on stable releases — prereleases (any tag
  # detected as prerelease by `release.prerelease: auto`, e.g. -rc1, -beta)
  # publish their version tag only, so existing :latest users don't get
  # auto-bumped to an unstable build.
  - id: pihole-mcp-default-docker
    ids:
      - pihole-mcp
    images:
      - "ghcr.io/hexamatic/pihole-mcp"
    tags:
      - "{{ .Version }}"
      - '{{ if not .Prerelease }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

  # Slim Docker image: ghcr.io/hexamatic/pihole-mcp:{version}-slim +
  # :latest-slim. Same prerelease guard as the default image.
  - id: pihole-mcp-slim-docker
    ids:
      - pihole-mcp-slim
    images:
      - "ghcr.io/hexamatic/pihole-mcp"
    tags:
      - "{{ .Version }}-slim"
      - '{{ if not .Prerelease }}latest-slim{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

# Homebrew tap — publishes a formula to hexamatic/homebrew-tap so macOS/Linux
# users can `brew install hexamatic/tap/pihole-mcp`. Uses the default-flavour
# archive only (the slim build is available via Docker / `go build -tags slim`).
# The tap repository (hexamatic/homebrew-tap) must exist before a release runs;
# `just release-dry` warns but does not fail if it is absent.
#
# NOTE: goreleaser marks `brews` (formulae) as deprecated in favour of
# `homebrew_casks`. Formulae are kept deliberately — they install on both macOS
# and Linux (Linuxbrew), whereas casks are macOS-only and need a quarantine
# hook for unsigned binaries. Revisit once a v0.x binary-signing story exists.
brews:
  - name: pihole-mcp
    ids:
      - default
    repository:
      owner: hexamatic
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/hexamatic/pihole-mcp"
    description: "Pi-hole v6 MCP server — DNS blocking, domain management, statistics and network administration"
    license: "MIT"
    install: |
      bin.install "pihole-mcp"
    test: |
      assert_match "pihole-mcp", shell_output("#{bin}/pihole-mcp -version")

# Scoop bucket — publishes a manifest to hexamatic/scoop-bucket so Windows
# users can install via `scoop install pihole-mcp`. Uses the default-flavour
# archive only; the slim build is available as a direct download from Releases.
# The bucket repository (hexamatic/scoop-bucket) must exist before a release.
scoops:
  - name: pihole-mcp
    ids:
      - default
    repository:
      owner: hexamatic
      name: scoop-bucket
      branch: main
    homepage: "https://github.com/hexamatic/pihole-mcp"
    description: "Pi-hole v6 MCP server — DNS blocking, domain management, statistics and network administration"
    license: MIT

# Linux packages — attaches .deb and .rpm packages to the GitHub release for
# users who prefer native package managers over tarballs. This is especially
# relevant for Raspberry Pi OS (Debian-based), the most common Pi-hole host.
# Uses the default build; no external repository hosting is required — users
# download and install locally (`dpkg -i` / `rpm -i`).
nfpms:
  - id: pihole-mcp-packages
    package_name: pihole-mcp
    ids:
      - pihole-mcp
    vendor: Hexamatic
    homepage: "https://github.com/hexamatic/pihole-mcp"
    maintainer: "hexamatic <61142173+lloydmcl@users.noreply.github.com>"
    description: "Pi-hole v6 MCP server — DNS blocking, domain management, statistics and network administration"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '(?i)^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '(?i)^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '(?i)^.*?perf(\([^)]+\))?!?:.+$'
      order: 2
    - title: Refactor
      regexp: '(?i)^.*?refactor(\([^)]+\))?!?:.+$'
      order: 3
    - title: Dependencies
      regexp: '(?i)^.*?(deps|dep|build)(\([^)]+\))?!?:.+$'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Release body comes from CHANGELOG.md via scripts/release-notes.sh — see
# .github/workflows/release.yml. The footer/changelog blocks below only
# apply when goreleaser runs without --release-notes (snapshot dry-runs and
# emergency manual releases). mode: keep-existing means a workflow re-run
# on an already-published tag will not overwrite the body — body amendments
# go through `gh release edit`, never through a re-run.
release:
  draft: false
  prerelease: auto
  mode: keep-existing
  footer: |
    **Full Changelog**: https://github.com/hexamatic/pihole-mcp/compare/{{ .PreviousTag }}...{{ .Tag }}
