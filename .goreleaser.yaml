version: 2

project_name: pihole-mcp

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hexamatic/pihole-mcp/internal/server.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

dockers_v2:
  - images:
      - "ghcr.io/hexamatic/pihole-mcp"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '(?i)^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '(?i)^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '(?i)^.*?perf(\([^)]+\))?!?:.+$'
      order: 2
    - title: Refactor
      regexp: '(?i)^.*?refactor(\([^)]+\))?!?:.+$'
      order: 3
    - title: Dependencies
      regexp: '(?i)^.*?(deps|dep|build)(\([^)]+\))?!?:.+$'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Release body comes from CHANGELOG.md via scripts/release-notes.sh — see
# .github/workflows/release.yml. The footer/changelog blocks below only
# apply when goreleaser runs without --release-notes (snapshot dry-runs and
# emergency manual releases). mode: keep-existing means a workflow re-run
# on an already-published tag will not overwrite the body — body amendments
# go through `gh release edit`, never through a re-run.
release:
  draft: false
  prerelease: auto
  mode: keep-existing
  footer: |
    **Full Changelog**: https://github.com/hexamatic/pihole-mcp/compare/{{ .PreviousTag }}...{{ .Tag }}
