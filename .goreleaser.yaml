version: 2

project_name: pihole-mcp

before:
  hooks:
    - go mod tidy

builds:
  # Default build — includes OpenTelemetry support. This is what users get
  # via `go install`, the standard release tarballs, and the unsuffixed
  # Docker tags.
  - id: pihole-mcp
    main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hexamatic/pihole-mcp/internal/server.Version={{.Version}}

  # Slim build — strips OpenTelemetry deps via the `slim` build tag. ~45%
  # smaller binary (17 MB → 9 MB on linux/amd64, 6 MB → 3.5 MB compressed).
  # Functionally identical aside from OTEL_EXPORTER_OTLP_ENDPOINT being a
  # no-op. Distributed alongside the default build for users who want a
  # leaner footprint (resource-constrained homelabs, no-tracing setups).
  - id: pihole-mcp-slim
    main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    tags:
      - slim
    ldflags:
      - -s -w
      - -X github.com/hexamatic/pihole-mcp/internal/server.Version={{.Version}}

archives:
  - id: default
    ids:
      - pihole-mcp
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

  - id: slim
    ids:
      - pihole-mcp-slim
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-slim_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

dockers_v2:
  # Default Docker image: ghcr.io/hexamatic/pihole-mcp:{version} + :latest
  - id: pihole-mcp-default-docker
    ids:
      - pihole-mcp
    images:
      - "ghcr.io/hexamatic/pihole-mcp"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

  # Slim Docker image: ghcr.io/hexamatic/pihole-mcp:{version}-slim + :latest-slim
  - id: pihole-mcp-slim-docker
    ids:
      - pihole-mcp-slim
    images:
      - "ghcr.io/hexamatic/pihole-mcp"
    tags:
      - "{{ .Version }}-slim"
      - latest-slim
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '(?i)^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '(?i)^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '(?i)^.*?perf(\([^)]+\))?!?:.+$'
      order: 2
    - title: Refactor
      regexp: '(?i)^.*?refactor(\([^)]+\))?!?:.+$'
      order: 3
    - title: Dependencies
      regexp: '(?i)^.*?(deps|dep|build)(\([^)]+\))?!?:.+$'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Release body comes from CHANGELOG.md via scripts/release-notes.sh — see
# .github/workflows/release.yml. The footer/changelog blocks below only
# apply when goreleaser runs without --release-notes (snapshot dry-runs and
# emergency manual releases). mode: keep-existing means a workflow re-run
# on an already-published tag will not overwrite the body — body amendments
# go through `gh release edit`, never through a re-run.
release:
  draft: false
  prerelease: auto
  mode: keep-existing
  footer: |
    **Full Changelog**: https://github.com/hexamatic/pihole-mcp/compare/{{ .PreviousTag }}...{{ .Tag }}
