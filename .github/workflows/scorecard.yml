name: Scorecard

# OpenSSF Scorecard analyses the repository's supply-chain security posture
# and publishes the score behind the README badge. Results also land in the
# repository's code-scanning tab via SARIF.
on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Access the GitHub OIDC token to publish verified results to
      # scorecard.dev (feeds the badge and the public viewer).
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
