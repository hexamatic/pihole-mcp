name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    name: Enforce CHANGELOG.md update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dangoslen/changelog-enforcer@8b5e9dc3121363bb7c0115f8533404d92af382de # v3.7.0
        with:
          changeLogPath: CHANGELOG.md
          # 'dependencies' is applied by Dependabot (see .github/dependabot.yml).
          # Dependency bumps are rolled up into the release's Dependencies section
          # at release-prep time rather than one changelog line per bot PR.
          skipLabels: Skip-Changelog,dependencies
          missingUpdateErrorMessage: >-
            This PR does not update CHANGELOG.md. Add an entry under the
            [Unreleased] section describing the user-visible change, or apply
            the 'Skip-Changelog' label if this PR is internal-only (refactor,
            tests, CI, dev tooling, no-op dependency bump).
