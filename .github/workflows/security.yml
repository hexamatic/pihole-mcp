name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # New advisories land against code that has not changed, so push/PR triggers
  # alone leave a quiet repository silently vulnerable. The weekly run catches
  # disclosures made against the existing tree.
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # govulncheck is the reachability layer: it fails only when an advisory is
  # actually callable from our code, which keeps the signal high enough to gate
  # merges on. Module-level advisories that we do not call are handled by
  # Dependabot's security updates instead (see .github/dependabot.yml) — between
  # the two, both "we can be exploited" and "we ship a vulnerable module" are
  # covered without one drowning the other in noise.
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-file: go.mod
          repo-checkout: false

  # Full-history secret scan. Runs the gitleaks CLI directly rather than
  # gitleaks-action, which requires a paid licence key for organisation
  # repositories. Allowlisted dev/test values live in .gitleaks.toml.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Scan history for secrets
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks git --redact --no-banner

  # A short fuzz smoke over the tool-parameter validators. 60 seconds is not
  # exhaustive fuzzing — it exists to catch regressions in the validator's
  # invariants cheaply on every run; deeper runs happen locally via `just fuzz`.
  fuzz:
    name: fuzz validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Fuzz smoke (60s)
        run: go test -run=^$ -fuzz=FuzzValidateDomainName -fuzztime=60s ./internal/tools/
