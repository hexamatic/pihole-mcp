name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check docs/TOOLS.md is current
        run: |
          go run ./cmd/toolsdoc
          git diff --exit-code docs/TOOLS.md

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.12"

      - name: Test
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/pihole-mcp

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/pihole-mcp

  integration:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Start Pi-hole instances
        run: docker compose -f .github/docker-compose.ci.yml up -d --wait

      - name: Integration tests
        env:
          PIHOLE_URL: http://localhost:8081
          PIHOLE_PASSWORD: test
          PIHOLE_1_URL: http://localhost:8081
          PIHOLE_1_PASSWORD: test
          PIHOLE_2_URL: http://localhost:8082
          PIHOLE_2_PASSWORD: test
        run: go test -tags=integration -race -count=1 ./internal/pihole/

      - name: Build binary
        run: go build -o ./bin/pihole-mcp ./cmd/pihole-mcp

      - name: Multi-instance E2E
        env:
          PIHOLE_URL: http://localhost:8081
          PIHOLE_PASSWORD: test
          PIHOLE_1_URL: http://localhost:8081
          PIHOLE_1_PASSWORD: test
          PIHOLE_2_URL: http://localhost:8082
          PIHOLE_2_PASSWORD: test
        run: ./scripts/e2e-test.sh ./bin/pihole-mcp

      - name: Pi-hole logs
        if: failure()
        run: docker compose -f .github/docker-compose.ci.yml logs
