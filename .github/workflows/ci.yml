name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check docs/TOOLS.md is current
        run: |
          go run ./cmd/toolsdoc
          git diff --exit-code docs/TOOLS.md

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: "v2.12"

      - name: Test
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build
        run: go build -o /dev/null ./cmd/pihole-mcp

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/pihole-mcp

  integration:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Start Pi-hole instances
        run: docker compose -f .github/docker-compose.ci.yml up -d --wait

      - name: Integration tests
        env:
          PIHOLE_URL: http://localhost:8081
          PIHOLE_PASSWORD: test
          PIHOLE_1_URL: http://localhost:8081
          PIHOLE_1_PASSWORD: test
          PIHOLE_2_URL: http://localhost:8082
          PIHOLE_2_PASSWORD: test
        run: go test -tags=integration -race -count=1 -covermode=atomic -coverprofile=integration.out -coverpkg=./... ./internal/pihole/

      - name: Upload integration coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: integration.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # -cover instruments the binary; every E2E process appends its counters
      # to GOCOVERDIR, and covdata merges the pile into one profile.
      - name: Build binary (coverage-instrumented)
        run: go build -cover -covermode=atomic -coverpkg=./... -o ./bin/pihole-mcp ./cmd/pihole-mcp

      - name: Multi-instance E2E
        env:
          PIHOLE_URL: http://localhost:8081
          PIHOLE_PASSWORD: test
          PIHOLE_1_URL: http://localhost:8081
          PIHOLE_1_PASSWORD: test
          PIHOLE_2_URL: http://localhost:8082
          PIHOLE_2_PASSWORD: test
          GOCOVERDIR: ${{ runner.temp }}/e2ecov
        run: |
          mkdir -p "$GOCOVERDIR"
          ./scripts/e2e-test.sh ./bin/pihole-mcp

      - name: Convert e2e coverage
        run: go tool covdata textfmt -i="${RUNNER_TEMP}/e2ecov" -o e2e.out

      - name: Upload e2e coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: e2e.out
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Pi-hole logs
        if: failure()
        run: docker compose -f .github/docker-compose.ci.yml logs
